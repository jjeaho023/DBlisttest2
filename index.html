    const questions = [{"part":1,"no":1,"question":"데이터 무결성 제약 조건 중 '개체 무결성 제약' 조건에 대한 설명으로 맞는 것은?","options":["릴레이션 내의 튜플들이 각 속성의 도메인에 지정된 값만을 가져야 한다.","기본키에 속해 있는 애트리뷰트는 널 값이나 중복 값을 가질 수 없다.","릴레이션은 참조할 수 없는 외래키 값을 가질 수 없다.","외래키 값은 참조 릴레이션의 기본키 값과 동일해야 한다."],"answer":2},{"part":1,"no":2,"question":"릴레이션 R1에 속한 애튜리뷰트의 조합인 외래키를 변경하려면 이를 참조하고 있는 릴레이션 R2의 기본키도 변경해야 하는데 이를 무엇이라 하는가?","options":["정보 무결성","고유 무결성","널 제약성","참조 무결성"],"answer":4},{"part":1,"no":3,"question":"주어진 속성의 값이 하나의 속성이 취할 수 있는 같은 타입의 모든 원자값들의 집합에 속한 값이어야 한다는 제약 조건은?","options":["기본키 제약 조건","외래키 제약 조건","도메인 제약 조건","키 제약 조건"],"answer":3},{"part":1,"no":4,"question":"데이터베이스 무결성에 관한 설명으로 옳은 것은?","options":["개체 무결성 규정은 한 릴레이션의 기본키를 구성하는 어떠한 속성값도 널(NULL) 값이나 중복값을 가질 수 없음을 규정하는 것이다.","참조 무결성 규정은 속성 값들이 사용자가 정의한 제약 조건에 만족해야 한다는 규정이다.","도메인 무결성 규정은 외래키 값은 Null이거나 참조 릴레이션의 기본키 값과 동일해야 한다는 규정이다.","사용자 정의 무결성 규정은 주어진 튜플의 값이 그 튜플이 정의된 도메인에 속한 값이어야 한다는 것을 규정하는 것이다."],"answer":1},{"part":1,"no":5,"question":"관계형 데이터베이스의 제약 조건 중 개체 무결성과 참조 무결성을 설명하는 아래 표에 들어갈 내용으로 적합하지 않은 것은?","image":"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAZ4AAACTCAIAAAAx9+gyAAAAA3NCSVQICAjb4U/gAAAgAElEQVR4nO29Z3xUV5rnf26qoCrlqlLOESWUEQogQCKYnGyDCcamjcd22+N2mO7dmd3Zmf7sTO9/9j/d49TOATA5moxNEKCEUEAgoZyzVKqgCjeefVG4LJQsaKFQOt8XfNC559R9qu69v3vCc54HgxACBAKBsC3wqTYAgUAgJh4kbQgEwgZB0oZAIGwQJG0IBMIGQdKGQCBsECRtCATCBkHShkAgbBDS+r/v9+0zGAxTaAoCgUA8GUuysgKDggaXPJS2sz+c+eC/PvDw8JgKqxAj09XVJZZInBwdp9oQBGL6IkDY093t4+s7srR1d3dRJPn+f/vvU2EbYmS+++ZrXz+/zEWLp9oQBGL6QtP0kYMHBEEYUo7m2hAIhA2CpA2BQNggSNoQCIQNgqQNgUDYIEjaEAiEDYKkDTG76O9Xl5eVMTT9qzXNZvP98vKG+nqe5yfBMACAIAgN9XV1tbUsy07OGW0Y8terIBAzHJqmc65fa25sWr9pU11NzYH9+/7bP/0PhVIJANDr9XW1tXW1tQLHefn4hIWHuyoUllb9avX+vd/5BwRu27nTzs7ubzcDQqjX6fR6/ZD4ryRFubi4iEQinucvnr/Assz2nS86OTv/7WeczSBpQ9gODMMYDYYhwkFRFIbjjfUN9+6WrVi5kqZpdV8fLwgAAK1Gc/TwobxbtxiGAQAQBOEfEPDab99UqlQAAJ7n+9VqV1cFHOYzZUWj0Xzz5Rd6nW60CjiOJ82bt2hJFkVRHMflXL/+48WLQzplnl5e23ft8vX1BQDo9XqGpvnRz4gYJ0jaELbD3bLSvd98o9freY4TBIEkSQzHo6Kjd+95FQAwRPIEQSgpLi7M ion":"관계 대수에 사용하는 일반 집합 연산자 중에서 결과로 산출되는 카디널리티가 두 릴레이션 중 카디널리티가 작은 릴레이션의 카디널리티보다 크지 않은 연산자는 무엇인가?","options":["합집합","교집합","차집합","교차곱"],"answer":2},{"part":1,"no":9,"question":"릴레이션 R의 차수가 4이고 카디널리티가 5이며, 릴레이션 S의 차수가 6이고 카디널리티가 7일 때, 두 개의 릴레이션을 카티션 프로덕트한 결과의 새로운 릴레이션의 차수와 카디널리티는 얼마인가?","options":["24, 35","24, 12","10, 35","10, 12"],"answer":3},{"part":1,"no":10,"question":"관계대수에 대한 설명으로 틀린 것은?","options":["주어진 릴레이션 조작을 위한 연산의 집합이다.","일반 집합 연산과 순수 관계 연산으로 구분된다.","질의에 대한 해를 구하기 위해 수행해야 할 연산의 순서를 명시한다.","원하는 정보와 그 정보를 어떻게 유도하는가를 기술하는 비절차적 방법이다."],"answer":4},{"part":1,"no":11,"question":"다음 R과 S 두 릴레이션에 대한 Division 연산의 수행 결과는?\n\nR\n-----------------\nD1 | D2 | D3\n-----------------\n a |  1 | A\n b |  1 | A\n c |  2 | A\n d |  2 | B\n\nS\n-----------------\nD2 | D3\n-----------------\n 1 | A","options":["결과 속성 D3의 값이 A, B인 릴레이션","결과 속성 D2의 값이 2, 2인 릴레이션","결과 속성 D3의 값이 A인 릴레이션","결과 속성 D1의 값이 a, b인 릴레이션"],"answer":4},{"part":1,"no":12,"question":"관계 대수식을 SQL 질의로 옳게 표현한 것은?\n\nπ이름(σ학과='교육'(학생))","options":["SELECT 학생 FROM 이름 WHERE 학과 = '교육';","SELECT 이름 FROM 학생 WHERE 학과 = '교육';","SELECT 교육 FROM 학과 WHERE 이름 = '학생';","SELECT 학과 FROM 학생 WHERE 이름 = '교육';"],"answer":2},{"part":1,"no":13,"question":"관계해석(Relational Calculus)에 대한 설명으로 잘못된 것은?","options":["튜플 관계해석과 도메인 관계해석이 있다.","원하는 정보와 그 정보를 어떻게 유도하는지를 기술하는 절차적인 특성을 가진다.","기본적으로 관계해석과 관계대수는 관계 데이터베이스를 처리하는 기능과 능력 면에서 동등하다.","수학의 Predicate Calculus에 기반을 두고 있다."],"answer":2},{"part":1,"no":14,"question":"관계대수와 관계해석에 대한 설명으로 옳지 않은 것은?","options":["관계대수는 원래 수학의 프레디킷 해석에 기반을 두고 있다.","관계대수로 표현한 식은 관계해석으로 표현할 수 있다.","관계해석은 관계 데이터의 연산을 표현하는 방법이다.","관계해석은 원하는 정보가 무엇이라는 것만 정의하는 비절차적인 특성을 가지고 있다."],"answer":1},{"part":1,"no":15,"question":"관계해석에서 '모든 것에 대하여'의 의미를 나타내는 논리 기호는?","options":["∃","∈","∀","⊂"],"answer":3},{"part":1,"no":16,"question":"조건을 만족하는 릴레이션의 수평적 부분집합으로 구성하며, 연산자의 기호는 그리스 문자 시그마(σ)를 사용하는 관계대수 연산은?","options":["Select","Project","Join","Division"],"answer":1},{"part":1,"no":17,"question":"정규화의 목적으로 틀린 것은?","options":["어떠한 릴레이션이라도 데이터베이스 내에서 표현 가능하게 만든다.","데이터 삽입 시 릴레이션을 재구성할 필요성을 줄인다.","중복을 배제하여 삽입, 삭제, 갱신 이상의 발생을 야기한다.","효과적인 검색 알고리즘을 생성할 수 있다."],"answer":3},{"part":1,"no":18,"question":"정규화의 필요성으로 거리가 먼 것은?","options":["데이터 구조의 안정성 최대화","중복 데이터의 활성화","수정, 삭제 시 이상 현상의 최소화","테이블 불일치 위험의 최소화"],"answer":2},{"part":1,"no":19,"question":"다음과 같이 왼쪽 릴레이션을 오른쪽 릴레이션으로 정규화했을 때 어떤 정규화 작업을 한 것인가?\n\n정규화 전\n----------------------\n국가        | 도시\n----------------------\n대한민국 | 서울, 부산\n미국        | 워싱턴, 뉴욕\n중국        | 베이징\n\n정규화 후\n---------------------\n국가        | 도시\n---------------------\n대한민국 | 서울\n대한민국 | 부산\n미국        | 워싱턴\n미국        | 뉴욕\n중국        | 베이징","options":["제1정규형","제2정규형","제3정규형","제4정규형"],"answer":1},{"part":1,"no":20,"question":"정규화를 거치지 않아 발생하게 되는 이상(anomaly) 현상의 종류에 대한 설명으로 옳지 않은 것은?","options":["삭제 이상이란 릴레이션에서 한 튜플을 삭제할 때 의도와는 상관없는 값들도 함께 삭제되는 연쇄 삭제 현상이다.","삽입 이상이란 릴레이션에서 데이터를 삽입할 때 의도와 상관없이 원하지 않는 값들도 함께 삽입되는 현상이다.","갱신 이상이란 릴레이션에서 튜플에 있는 속성값을 갱신할 때 일부 튜플의 정보만 갱신되어 정보에 모순이 생기는 현상이다.","종속 이상이란 하나의 릴레이션에 하나 이상의 함수적 종속성이 존재하는 현상이다."],"answer":4},{"part":1,"no":21,"question":"정규화 과정 중 1NF에서 2NF가 되기 위한 조건은?","options":["1NF를 만족하고 모든 도메인이 원자값이어야 한다.","1NF를 만족하고, 키가 아닌 모든 애트리뷰트들이 기본키에 이행적으로 함수 종속되지 않아야 한다.","1NF를 만족하고 다치 종속이 제거되어야 한다.","1NF를 만족하고 키가 아닌 모든 속성이 기본키에 대하여 완전 함수적 종속 관계를 만족해야 한다."],"answer":4},{"part":1,"no":22,"question":"제3정규형에서 보이스코드 정규형(BCNF)으로 정규화하기 위한 작업은?","options":["원자 값이 아닌 도메인을 분해","부분 함수 종속 제거","이행 함수 종속 제거","결정자가 후보키가 아닌 함수 종속 제거"],"answer":4},{"part":1,"no":23,"question":"어떤 릴레이션 R에서 X와 Y를 각각 R의 애트리뷰트 집합의 부분집합이라고 할 경우 애트리뷰트 X의 각 값에 대해 시간에 관계없이 항상 애트리뷰트 Y의 값이 오직 하나만 연관되어 있을 때, 이 함수 종속의 표기를 옳은 것은?","options":["Y → X","Y ⊂ X","X → Y","X ⊂ Y"],"answer":3},{"part":1,"no":24,"question":"다음 조건을 모두 만족하는 정규형은?\n\n• 테이블 R에 속한 모든 도메인이 원자값만으로 구성되어 있다.\n• 테이블 R에서 키가 아닌 모든 필드가 키에 대해 함수적으로 종속되며, 키의 부분집합이 결정자가 되는 부분 종속이 존재하지 않는다.\n• 테이블 R에 존재하는 모든 함수적 종속에서 결정자가 후보키이다.","options":["BCNF","제1정규형","제2정규형","제3정규형"],"answer":1},{"part":1,"no":25,"question":"다음에 해당하는 함수 종속의 추론 규칙은?\n\nX → Y이고 Y → Z이면 X → Z이다.","options":["분해 규칙","이행 규칙","반사 규칙","결합 규칙"],"answer":2},{"part":1,"no":26,"question":"데이터의 중복으로 인하여 관계 연산을 처리할 때 예기치 못한 곤란한 현상이 발생하는 것을 무엇이라 하는가?","options":["이상(Anomaly)","제한(Restriction)","종속성(Dependency)","변환(Translation)"],"answer":1},{"part":1,"no":27,"question":"정규화에 대한 설명으로 적절하지 않은 것은?","options":["데이터베이스의 개념적 설계 단계 이전에 수행한다.","데이터 구조의 안정성을 최대화한다.","중복을 배제하여 삽입, 삭제, 갱신 이상의 발생을 방지한다.","데이터 삽입 시 릴레이션을 재구성할 필요성을 줄인다."],"answer":1},{"part":1,"no":28,"question":"정규화에 대한 설명으로 옳지 않은 것은?","options":["정규형에는 제1정규형, 제2정규형, 제3정규형, BCNF형, 제4정규형 등이 있다.","릴레이션에 속한 모든 도메인이 원자값만으로 되어 있는 정규형은 제1정규형이다.","제1정규형이 제2정규형이 되기 위해서는 기본키가 아닌 모든 속성이 기본키에 대하여 완전 함수적 종속을 만족해야 한다.","결정자가 모두 후보키인 정규형은 제3정규형이다."],"answer":4},{"part":1,"no":29,"question":"정규화 과정에서 함수 종속이 A → B이고 B → C일 때 A → C인 관계를 제거하는 단계는?","options":["1NF → 2NF","2NF → 3NF","3NF → BCNF","BCNF → 4NF"],"answer":2},{"part":1,"no":30,"question":"데이터 속성 간의 종속성에 대한 엄밀한 고려 없이 잘못 설계된 데이터베이스에서는 데이터 처리 연산 수행 시 각종 이상 현상이 발생할 수 있는데, 이러한 이상 현상이 아닌 것은?","options":["검색 이상","삽입 이상","삭제 이상","갱신 이상"],"answer":1},{"part":1,"no":31,"question":"다음 정의에서 말하는 기본 정규형은?\n\n어떤 릴레이션 R에 속한 모든 도메인이 원자값(Atomic Value)만으로 되어 있다.","options":["제1정규형(1NF)","제2정규형(2NF)","제3정규형(3NF)","보이스/코드 정규형(BCNF)"],"answer":1},{"part":1,"no":32,"question":"이전 단계의 정규형을 만족하면서 후보키를 통하지 않는 조인 종속(JD: Join Dependency)을 제거해야 만족하는 정규형은?","options":["제3정규형","제4정규형","제5정규형","제6정규형"],"answer":3},{"part":1,"no":33,"question":"다음 중 반정규화에 대한 설명으로 가장 옳지 않은 것은?","options":["반정규화는 의도적으로 정규화 원칙을 위배하는 행위이다.","반정규화를 수행하면 시스템의 성능이 저하된다.","반정규화로 인해 데이터의 일관성 및 정합성이 저하될 수 있다.","반정규화 방법에는 테이블 통합, 테이블 분할, 중복 테이블 및 중복 속성 추가 등이 있다."],"answer":2},{"part":1,"no":34,"question":"다음 중 반정규화 방법 중 테이블 통합의 종류가 아닌 것은?","options":["1:1 관계 테이블 통합","1:N 관계 테이블 통합","슈퍼/서브타입 테이블 통합","N:M 관계 테이블 통합"],"answer":4},{"part":1,"no":35,"question":"다음 중 반정규화 시 중복 테이블을 추가해야 하는 경우가 아닌 것은?","options":["많은 양의 범위를 자주 처리해야 하는 경우","특정 범위의 데이터만 자주 처리해야 하는 경우","처리 범위를 늘리지 않고는 수행 속도를 개선할 수 없는 경우","정규화로 인해 수행 속도가 느려지는 경우"],"answer":3},{"part":1,"no":36,"question":"다음의 내용은 반정규화의 어떤 유형에 대한 고려사항인가?\n\n• 데이터 검색은 간편하지만 Row 수가 증가하여 처리량이 증가할 수 있음을 고려해야 한다.\n• 입력, 수정, 삭제 규칙이 복잡해질 수 있음을 고려해야 한다.\n• Not Null, Default, Check 등의 Constraint를 설계하기 어려운 점을 고려해야 한다.","options":["테이블 통합","테이블 분할","중복 테이블 추가","중복 속성 추가"],"answer":1},{"part":1,"no":37,"question":"다음 중 반정규화 시 중복 속성을 추가해야 하는 경우가 아닌 것은?","options":["기본키가 하나의 속성으로 구성된 경우","조인이 자주 발생하는 속성인 경우","접근 경로가 복잡한 속성인 경우","액세스의 조건으로 자주 사용되는 속성인 경우"],"answer":1},{"part":1,"no":38,"question":"정규화된 엔티티, 속성, 관계를 시스템의 성능 향상과 개발 운영의 단순화를 위해 중복, 통합, 분리 등을 수행하는 데이터 모델링 기법은?","options":["인덱스정규화","반정규화","집단화","머징"],"answer":2},{"part":1,"no":39,"question":"반정규화(Denormalization) 유형 중 중복 테이블을 추가하는 방법에 해당하지 않는 것은?","options":["빌드 테이블의 추가","집계 테이블의 추가","진행 테이블의 추가","특정 부분만을 포함하는 테이블 추가"],"answer":1},{"part":1,"no":40,"question":"다음 반정규화 방법 중 중복 속성 추가 시 고려할 사항으로 가장 거리가 먼 것은?","options":["테이블 중복과 속성의 중복을 고려한다.","데이터 일관성 및 무결성에 유의해야 한다.","SQL Group Function을 이용하여 해결 가능한지 검토한다.","기본키의 유일성 관리가 어려워짐을 고려한다."],"answer":4},{"part":1,"no":41,"question":"다음 중 자료 사전(Data Dictionary)에 대한 설명으로 옳지 않은 것은?","options":["메타 데이터(Meta Data)라고 한다.","모든 데이터 개체들에 대한 정보를 유지, 관리하는 시스템이다.","일반 이용자도 SQL을 이용하여 내용을 검색해 볼 수 있다.","자료 사전에 대한 갱신은 데이터베이스의 무결성 유지를 위해 이용자가 직접 갱신해야 한다."],"answer":4},{"part":1,"no":42,"question":"데이터베이스에 포함되는 모든 데이터 객체들에 대한 정의나 명세에 관한 정보를 유지 관리하는 시스템을 무엇이라 하는가?","options":["데이터 디렉터리","데이터 사전","저장 시스템","메타 시스템"],"answer":2},{"part":1,"no":43,"question":"다음 영문의 괄호 안 내용으로 가장 적절한 것은?\n\nA(n) (      ) is a file that contains meta data that is, data about data. This file is consulted before actual data are read or modified in the database system.","options":["VIEW","Index","ISAM File","Data Dictionary"],"answer":4},{"part":1,"no":44,"question":"시스템 카탈로그에 대한 설명으로 옳지 않은 것은?","options":["사용자가 직접 시스템 카탈로그의 내용을 갱신하여 데이터베이스 무결성을 유지한다.","시스템 자신이 필요로 하는 스키마 및 여러 가지 객체에 관한 정보를 포함하고 있는 시스템 데이터베이스이다.","시스템 카탈로그에 저장되는 내용을 메타 데이터라고도 한다.","시스템 카탈로그는 DBMS가 스스로 생성하고 유지한다."],"answer":1},{"part":1,"no":45,"question":"시스템 카탈로그에 대한 설명으로 옳지 않은 것은?","options":["시스템 자체에 관련 있는 다양한 객체에 관한 정보를 포함하는 시스템 데이터베이스이다.","데이터 사전이라고도 한다.","기본 테이블, 뷰, 인덱스, 패키지, 접근 권한 등의 정보를 저장한다.","시스템을 위한 정보를 포함하는 시스템 데이터베이스이므로 일반 사용자는 SQL을 이용하여 내용을 검색해 볼 수 없다."],"answer":4},{"part":1,"no":46,"question":"시스템 카탈로그에 대한 설명으로 옳지 않은 것은?","options":["시스템 카탈로그에 저장된 정보를 슈퍼 데이터(Super Data)라고 한다.","시스템 자신이 필요로 하는 스키마 및 여러 가지 객체에 관한 정보를 포함하고 있는 시스템 데이터베이스이다.","카탈로그들이 생성되면 자료 사전에 저장되기 때문에 좁은 의미로 자료 사전이라고 한다.","시스템 카탈로그에 대한 사용자의 접근은 읽기 전용으로만 허용된다."],"answer":1},{"part":1,"no":47,"question":"데이터 사전에 대한 설명으로 틀린 것은?","options":["시스템 카탈로그 또는 시스템 데이터베이스라고도 한다.","데이터 사전 역시 데이터베이스의 일종이므로 일반 사용자가 생성, 유지 및 수정할 수 있다.","데이터베이스에 대한 데이터인 메타데이터(Metadata)를 저장하고 있다.","데이터 사전에 있는 데이터에 실제로 접근하는 데 필요한 위치 정보는 데이터 디렉토리(Data Directory)라는 곳에서 관리한다."],"answer":2},{"part":2,"no":1,"question":"다음 설명과 관련 있는 트랜잭션의 특성은?\n[트랜잭션의 연산은 모두 실행되거나, 모두 실행되지 않아야 한다.]","options":["Durability","Isolation","Consistency","Atomicity"],"answer":4},{"part":2,"no":2,"question":"트랜잭션의 특성을 모두 나열한 것은?\n\nㄱ. Atomicity\nㄴ. Durability\nㄷ. Transparency\nㄹ. Portability\nㅁ. Consistency\nㅂ. Isolation","options":["ㄱ, ㄴ","ㄱ, ㄴ, ㅂ","ㄱ, ㄷ, ㅁ","ㄱ, ㄴ, ㅁ, ㅂ"],"answer":4},{"part":2,"no":3,"question":"데이터베이스에 영향을 주는 생성, 읽기, 갱신, 삭제 연산으로 프로세스와 테이블 간에 매트릭스를 만들어서 트랜잭션을 분석하는 것은?","options":["CASE 분석","일치 분석","CRUD 분석","연관성 분석"],"answer":3},{"part":2,"no":4,"question":"트랜잭션의 상태 중 트랜잭션의 마지막 연산이 실행된 직후의 상태로, 모든 연산의 처리는 끝났지만 트랜잭션이 수행한 최종 결과를 데이터베이스에 반영하지 않은 상태는?","options":["Active","Partially Committed","Committed","Aborted"],"answer":2},{"part":2,"no":5,"question":"무결성을 보장하기 위해 트랜잭션이 가져야 할 특성에 대한 설명으로 옳지 않은 것은?","options":["트랜잭션 내의 모든 변경은 반드시 완벽히 수행되어야 하며, 모두가 완벽히 수행되지 않고 어느 하나라도 오류가 발생하면 트랜잭션 전부가 취소되어야 한다.","트랜잭션의 수행과 관계없이 데이터베이스가 가지고 있는 고정 요소는 일관되어야 한다.","둘 이상의 트랜잭션이 동시에 병행 실행되는 경우 어느 하나의 트랜잭션 실행 중에 다른 트랜잭션의 연산이 끼어들 수 없다.","Commit과 Rollback 명령어에 의해 보장 받는 트랜잭션의 특성은 일관성이다."],"answer":4},{"part":2,"no":6,"question":"데이터베이스에서 하나의 논리적 기능을 수행하기 위한 작업의 단위 또는 한꺼번에 모두 수행되어야 할 일련의 연산들을 의미하는 것은?","options":["트랜잭션","뷰","튜플","카디널리티"],"answer":1},{"part":2,"no":7,"question":"트랜잭션의 주요 특성 중 하나로, 둘 이상의 트랜잭션이 동시에 병행 실행되는 경우 어느 하나의 트랜잭션 실행 중에 다른 트랜잭션의 연산이 끼어들 수 없음을 의미하는 것은?","options":["Log","Consistency","Isolation","Durability"],"answer":3},{"part":2,"no":8,"question":"다음과 같은 트랜잭션의 특성은?\n[시스템이 가지고 있는 고정 요소는 트랜잭션 수행 전과 트랜잭션 수행 완료 후의 상태가 같아야 한다.]","options":["원자성(atomicity)","일관성(consistency)","격리성(isolation)","영속성(durability)"],"answer":2},{"part":2,"no":9,"question":"인덱스(Index)에 대한 설명으로 부적절한 것은?","options":["인덱스는 데이터베이스의 물리적 구조와 밀접한 관계가 있다.","인덱스는 하나 이상의 필드로 만들어도 된다.","레코드의 삽입과 삭제가 수시로 일어나는 경우는 인덱스의 개수를 최대한 많게 한다.","인덱스를 통해서 테이블의 레코드에 대한 액세스를 빠르게 수행할 수 있다."],"answer":3},{"part":2,"no":10,"question":"데이터베이스의 인덱스와 관련한 설명으로 틀린 것은?","options":["문헌의 색인, 사전과 같이 데이터를 쉽고 빠르게 찾을 수 있도록 만든 데이터 구조이다.","테이블에 붙여진 색인으로 데이터 검색 시 처리 속도 향상에 도움이 된다.","인덱스의 추가, 삭제 명령어는 각각 ADD, DELETE이다.","대부분의 데이터베이스에서 테이블을 삭제하면 인덱스도 같이 삭제된다."],"answer":3},{"part":2,"no":11,"question":"데이터베이스 성능에 많은 영향을 주는 DBMS의 구성 요소로, 테이블과 클러스터에 연관되어 독립적인 저장 공간을 보유하며, 데이터베이스에 저장된 자료를 더욱 빠르게 조회하기 위하여 사용되는 것은?","options":["인덱스(Index)","트랜잭션(Transaction)","역정규화(Denormalization)","트리거(Trigger)"],"answer":1},{"part":2,"no":12,"question":"데이터베이스에서 인덱스(Index)와 관련한 설명으로 틀린 것은?","options":["인덱스의 기본 목적은 검색 성능을 최적화하는 것으로 볼 수 있다.","B-트리 인덱스는 분기를 목적으로 하는 Branch Block을 가지고 있다.","BETWEEN 등 범위(Range) 검색에 활용될 수 있다.","시스템이 자동으로 생성하여 사용자가 변경할 수 없다."],"answer":4},{"part":2,"no":13,"question":"뷰(View)에 대한 설명으로 옳지 않은 것은?","options":["뷰는 CREATE문을 사용하여 정의한다.","뷰는 데이터의 논리적 독립성을 제공한다.","뷰를 제거할 때에는 DROP문을 사용한다.","뷰는 저장장치 내에 물리적으로 존재한다."],"answer":4},{"part":2,"no":14,"question":"뷰(VIEW)에 대한 설명으로 틀린 것은?","options":["뷰 위에 또 다른 뷰를 정의할 수 있다.","뷰에 대한 조작에서 삽입, 갱신, 삭제 연산은 제약이 따른다.","뷰의 정의는 기본 테이블과 같이 ALTER문을 이용하여 변경한다.","뷰가 정의된 기본 테이블이 제거되면 뷰도 자동적으로 제거된다."],"answer":3},{"part":2,"no":15,"question":"뷰(View)의 장점이 아닌 것은?","options":["뷰 자체로 인덱스를 가짐","데이터 보안 용이","논리적 독립성 제공","사용자 데이터 관리 용이"],"answer":1},{"part":2,"no":16,"question":"데이터베이스에서의 뷰(View)에 대한 설명으로 틀린 것은?","options":["뷰는 다른 뷰를 기반으로 새로운 뷰를 만들 수 있다.","뷰는 일종의 가상 테이블이며, UPDATE에는 제약이 따른다.","뷰는 기본 테이블을 만드는 것처럼 CREATE VIEW를 사용하여 만들 수 있다.","뷰는 논리적으로 존재하는 기본 테이블과 다르게 물리적으로만 존재하며 카탈로그에 저장된다."],"answer":4},{"part":2,"no":17,"question":"뷰(VIEW)에 관한 설명으로 옳지 않은 것은?","options":["뷰는 가상 테이블이므로 물리적으로 구현되어 있지 않다.","하나의 뷰를 제거해도 그 뷰를 기초로 정의된 다른 뷰는 제거되지 않는다.","필요한 데이터만 뷰로 정의해서 처리할 수 있기 때문에 관리가 용이하다.","SQL에서 뷰를 생성할 때는 CREATE문을 사용한다."],"answer":2},{"part":2,"no":18,"question":"뷰(View)에 대한 설명 중 옳은 내용으로만 나열한 것은?\n\nㄱ. 뷰는 저장장치 내에 물리적으로 존재한다.\nㄴ. 뷰가 정의된 기본 테이블이 삭제되더라도 뷰는 자동으로 삭제되지 않는다.\nㄷ. DBA는 보안 측면에서 뷰를 활용할 수 있다.\nㄹ. 뷰로 구성된 내용에 대한 삽입, 삭제, 갱신 연산에는 제약이 따른다.","options":["ㄱ, ㄴ, ㄷ, ㄹ","ㄱ, ㄷ, ㄹ","ㄴ, ㄹ","ㄷ, ㄹ"],"answer":4},{"part":2,"no":19,"question":"물리 데이터 저장소의 파티션 설계에서 파티션 유형으로 옳지 않은 것은?","options":["범위 분할(Range Partitioning)","해시 분할(Hash Partitioning)","조합 분할(Composite Partitioning)","유닛 분할(Unit Partitioning)"],"answer":4},{"part":2,"no":20,"question":"병렬 데이터베이스 환경 중 수평 분할에서 활용되는 분할 기법이 아닌 것은?","options":["라운드-로빈","범위 분할","예측 분할","해시 분할"],"answer":3},{"part":2,"no":21,"question":"파티셔닝 방식 중 ‘월별, 분기별’과 같이 지정한 열의 값을 기준으로 범위를 지정하여 분할하는 방식은?","options":["Range Partitioning","Hash Partitioning","Composite Partitioning","List Partitioning"],"answer":1},{"part":2,"no":22,"question":"다음 중 Hash 파티셔닝에 대한 설명으로 옳은 것을 모두 고른 것은?\n\nㄱ. 지정한 열의 값을 기준으로 범위를 지정하여 분할\nㄴ. 데이터를 고르게 분산할 때 유용\nㄷ. 데이터가 고른 컬럼에 효과적\nㄹ. 해시 함수를 이용하여 데이터 분할","options":["ㄱ, ㄴ, ㄷ, ㄹ","ㄱ, ㄴ, ㄷ","ㄱ, ㄹ","ㄴ, ㄷ, ㄹ"],"answer":4},{"part":2,"no":23,"question":"분산 데이터베이스 시스템과 관련한 설명으로 틀린 것은?","options":["물리적으로 분산된 데이터베이스 시스템을 논리적으로 하나의 데이터베이스 시스템처럼 사용할 수 있도록 한 것이다.","물리적으로 분산되어 지역별로 필요한 데이터를 처리할 수 있는 지역 컴퓨터(Local Computer)를 분산 처리기(Distributed Processor)라고 한다.","분산 데이터베이스 시스템을 위한 통신 네트워크 구조가 데이터 통신에 영향을 주므로 효율적으로 설계해야 한다.","데이터베이스가 분산되어 있음을 사용자가 인식할 수 있도록 분산 투명성(Distribution Transparency)을 배제해야 한다."],"answer":4},{"part":2,"no":24,"question":"분산 데이터베이스의 특징에 대한 설명으로 틀린 것은?","options":["지역 서버의 고유 데이터에 대한 작업은 중앙 서버의 통제 없이 자유롭게 수행할 수 있다.","새로운 지역 서버를 추가하거나 장비를 추가하는 등의 작업이 용이하다.","위치 투명성, 중복 투명성, 병행 투명성, 장애 투명성을 목표로 한다.","데이터베이스 설계 및 소프트웨어 개발이 쉽고, 전반적인 시스템의 성능이 향상된다."],"answer":4},{"part":2,"no":25,"question":"분산 데이터베이스 시스템(Distributed Database System)에 대한 설명으로 틀린 것은?","options":["분산 데이터베이스는 논리적으로는 하나의 시스템에 속하지만 물리적으로는 여러 개의 컴퓨터 사이트에 분산되어 있다.","위치 투명성, 중복 투명성, 병행 투명성, 장애 투명성을 목표로 한다.","데이터베이스의 설계가 비교적 어렵고, 개발 비용과 처리 비용이 증가한다는 단점이 있다.","분산 데이터베이스 시스템의 주요 구성 요소는 분산 처리기, P2P 시스템, 단일 데이터베이스 등이 있다."],"answer":4},{"part":2,"no":26,"question":"분산 데이터베이스의 투명성(Transparency)에 해당하지 않는 것은?","options":["Location Transparency","Replication Transparency","Failure Transparency","Media Access Transparency"],"answer":4},{"part":2,"no":27,"question":"분산 데이터베이스 목표 중 '데이터베이스의 분산된 물리적 환경에서 특정 지역의 컴퓨터 시스템이나 네트워크에 장애가 발생해도 데이터 무결성이 보장된다.'는 것과 관계있는 것은?","options":["장애 투명성","병행 투명성","위치 투명성","중복 투명성"],"answer":1},{"part":2,"no":28,"question":"데이터가 물리적으로 저장되어 있는 위치를 알 필요 없이 데이터베이스의 논리적 명칭만으로 접근할 수 있는 것을 의미하는 분산 데이터베이스 목표는?","options":["Concurrency Transparency","Failure Transparency","Location Transparency","Replication Transparency"],"answer":3},{"part":2,"no":29,"question":"분산 데이터베이스에 대한 설명으로 옳지 않은 것은?","options":["분산 데이터베이스는 논리적으로는 하나의 시스템에 속하지만 물리적으로는 여러 개의 컴퓨터 사이트에 분산되어 있다.","분산 설계 방법에는 테이블 위치 분산, 분할, 할당이 있다.","비중복 할당은 최적의 노드를 선택해서 분산 데이터베이스의 단일 노드에서만 분할이 존재하도록 하는 것이다.","수직 분할은 특정 속성의 값을 기준으로 행(Row) 단위로 분할하는 것이다."],"answer":4},{"part":2,"no":30,"question":"암호화 기법 중 암호화 알고리즘과 암호화키는 공개해서 누구든지 평문을 암호문으로 만들 수 있지만, 해독 알고리즘과 해독키는 비밀로 유지하는 기법을 무엇이라 하는가?","options":["DES(Data Encryption Standard) 기법","공중키(Public Key) 암호화 기법","대치(Substitution) 암호화 기법","전치(Transposed) 암호화 기법"],"answer":2},{"part":2,"no":31,"question":"데이터베이스 보안에 대한 설명으로 옳지 않은 것은?","options":["보안을 위한 데이터 단위는 테이블 전체로부터 특정 테이블의 특정한 행과 열 위치에 있는 특정한 데이터 값에 이르기까지 다양하다.","각 사용자들은 일반적으로 서로 다른 객체에 대하여 다른 접근 권리 또는 권한을 갖게 된다.","불법적인 데이터의 접근으로부터 데이터베이스를 보호하는 것이다.","보안을 위한 사용자들의 권한 부여는 관리자의 정책 결정보다는 DBMS가 자체 결정하여 제공한다."],"answer":4},{"part":2,"no":32,"question":"정보보호를 위한 암호화에 대한 설명으로 틀린 것은?","options":["평문 - 암호화되기 전의 원본 메시지","암호문 - 암호화가 적용된 메시지","복호화 - 평문을 암호문으로 바꾸는 작업","키(Key) - 적절한 암호화를 위하여 사용하는 값"],"answer":3},{"part":2,"no":33,"question":"다음은 정보의 접근통제 정책에 대한 설명이다. (ㄱ)에 들어갈 내용으로 옳은 것은?\n\n[정책 | (ㄱ) | DAC | RBAC\n권한 부여 | 시스템 | 데이터 소유자 | 중앙 관리자\n접근 결정 | 보안등급(Label) | 신분(Identity) | 역할(Role)\n정책 변경 | 고정적(변경 어려움) | 변경 용이 | 변경 용이\n장점 | 안정적 중앙집중적 | 구현 용이·유연함 | 관리 용이]","options":["NAC","MAC","SDAC","AAC"],"answer":2},{"part":2,"no":34,"question":"정보 보안을 위한 접근통제 정책 종류에 해당하지 않는 것은?","options":["임의적 접근 통제","데이터 전환 접근 통제","강제적 접근 통제","역할 기반 접근 통제"],"answer":2},{"part":2,"no":35,"question":"접근 통제 방법 중 조직 내에서 직무, 직책 등 개인의 역할에 따라 결정하여 부여하는 접근 정책은?","options":["RBAC","DAC","MAC","QAC"],"answer":1},{"part":2,"no":36,"question":"다음 중 접근통제 보안 모델에 대한 설명으로 틀린 것은?","options":["기밀성 모델은 군사적인 목적으로 개발된 최초의 수학적 모델로, 기밀성 보장이 최우선인 모델이다.","무결성 모델은 기밀성 모델에서 발생하는 불법적인 정보 변경을 방지하기 위해 무결성을 기반으로 개발된 모델이다.","기밀성은 시스템 내의 정보는 인가된 사용자만 수정할 수 있는 것으로, 정보가 전송 중에 수정되지 않고 전달되는 것을 보장한다.","무결성 모델은 데이터의 일관성 유지에 중점을 두어 개발되었다."],"answer":3},{"part":2,"no":37,"question":"정보 시스템 내에서 어떤 주체가 특정 개체에 접근하려 할 때, 양쪽의 보안 레이블(Security Label)에 기초하여 높은 보안 수준을 요구하는 정보(객체)가 낮은 보안 수준의 주체에게 노출되지 않도록 하는 접근 제어 방법은?","options":["Mandatory Access Control","User Access Control","Discretionary Access Control","Data-Label Access Control"],"answer":1},{"part":2,"no":38,"question":"다음 내용이 설명하는 접근 제어 모델은?\n\n- 군대의 보안 레벨처럼 정보의 기밀성에 따라 상하 관계가 구분된 정보를 보호하기 위해 사용\n- 자신의 보안 수준보다 높은 문서는 읽을 수 없고, 자신의 보안 수준보다 낮은 문서는 읽을 수 있다.\n- 자신의 보안 수준보다 높은 수준의 문서에는 쓰기가 가능하지만, 보안 레벨이 낮은 문서의 쓰기 권한은 제한한다.","options":["Clark-Wilson Integrity Model","PDCA Model","Bell-Lapadula Model","Chinese Wall Model"],"answer":3},{"part":2,"no":39,"question":"다음 중 데이터베이스 백업에 대한 설명으로 틀린 것은?","options":["DBMS는 데이터베이스 파괴 시 복구하는 기능을 제공한다.","데이터베이스 백업은 정기적으로 수행하는 것이 좋다.","데이터베이스의 상태를 일관성 있게 유지시키기 위해 로그 파일이 이용된다.","로그 파일은 데이터베이스의 상태 변화에 대한 내용을 작업 순서에 따라 기록한 파일이다."],"answer":1},{"part":2,"no":40,"question":"데이터 양이 방대해지면서 백업에 대한 중요성이 부각되고 있다. 다음 중 백업에 대한 설명으로 가장 옳지 않은 것은?","options":["백업 종류에는 물리 백업과 논리 백업이 있다.","물리 백업은 운영체제를 이용한 것으로 데이터베이스 파일을 백업한다.","논리 백업은 DBMS를 이용한 것으로 DB 내의 논리적 객체들을 백업한다.","논리 백업은 완전 복구가 가능하다."],"answer":4},{"part":2,"no":41,"question":"다음 설명에 부합하는 용어로 옳은 것은?\n[장비 고장 등의 비상상태에도 데이터가 보존되도록 복사하는 작업]","options":["복원","백업","복구","정규화"],"answer":2},{"part":2,"no":42,"question":"다음 내용이 설명하는 것은?\n\n- 네트워크상에 광 채널 스위치의 이점인 고속 전송과 장거리 연결 및 멀티 프로토콜 기능을 활용\n- 각기 다른 운영체제를 가진 여러 기종들이 네트워크상에서 동일 저장장치의 데이터를 공유하게 함으로써, 여러 개의 저장장치나 백업 장비를 단일화시킨 시스템","options":["SAN","MBR","NAC","NIC"],"answer":1},{"part":2,"no":43,"question":"다음 중 DAS(Direct Attached Storage)에 대한 설명으로 틀린 것은?","options":["저장장치를 공유함으로써 여러 개의 저장장치나 백업 장비를 단일화시킬 수 있다.","서버에서 저장장치를 관리한다.","초기 구축 비용 및 유지보수 비용이 저렴하다.","확장성 및 유연성이 상대적으로 떨어진다."],"answer":1},{"part":2,"no":44,"question":"다음 내용이 설명하는 스토리지 시스템은?\n\n- 하드디스크와 같은 데이터 저장장치를 호스트버스 어댑터에 직접 연결하는 방식\n- 저장장치와 호스트 기기 사이에 네트워크 디바이스가 있지 말아야 하고 직접 연결하는 방식으로 구성","options":["DAS","NAS","N-SCREEN","NFC"],"answer":1},{"part":2,"no":45,"question":"스토리지(Storage)의 종류 중 DAS(Direct Attached Storage)에 대한 설명으로 옳지 않은 것은?","options":["서버와 저장장치를 전용 케이블로 직접 연결하는 방식이다.","저장 데이터가 적고 공유가 필요 없는 환경에 적합하다.","네트워크를 통해 파일에 직접 접근할 수 있다.","초기 구축 비용 및 유지보수 비용이 저렴하다."],"answer":3},{"part":2,"no":46,"question":"DAS(Direct Attached Storage) 연결에 사용되는 프로토콜로 관련 없는 것은?","options":["eSATA","SATA","SCSI","iSCSI"],"answer":4},{"part":3,"no":1,"question":"다음 중 데이터 모델링의 특징인 ‘추상화’에 대한 설명으로 가장 올바른 것은?","options":["관계나 구조를 이해하기 쉽게 표현 방식을 단순화하는 것이다.","해석의 모호함이 없도록 명확한 단어를 사용하여 이름을 부여하는 것이다.","현실 세계의 정보 중 모델의 목적에 맞는 핵심 정보만 선별하여 표현하는 것이다.","데이터 구조를 쉽게 수정할 수 있도록 만들어 유연성을 확보하는 것이다."],"answer":3},{"part":3,"no":2,"question":"데이터 모델링의 세 가지 관점에 해당하지 않는 것은?","options":["데이터 관점(What)","프로세스 관점(How)","상관 관점(Interaction)","기술 관점(Technology)"],"answer":4},{"part":3,"no":3,"question":"데이터 모델링을 개념적-논리적-물리적 단계로 진행할 때, 각 단계에 대한 설명으로 가장 올바르지 않은 것은?","options":["개념적 모델링은 업무 전체를 조망하며 핵심 엔터티와 관계를 정의한다.","논리적 모델링은 특정 데이터베이스 제품에 종속되지 않는 형태로 모델을 상세화한다.","물리적 모델링은 데이터 타입, 인덱스 등 물리적 요소를 결정하며 성능을 고려한다.","개념적 모델링은 모든 속성과 키를 상세하게 정의하여 재사용성을 높인다."],"answer":4},{"part":3,"no":4,"question":"다음 중 데이터 모델링의 세 가지 주요 특징으로 올바르게 짝지어진 것은?","options":["추상화, 단순화, 구체화","추상화, 상세화, 명확화","추상화, 단순화, 명확화","일반화, 단순화, 명확화"],"answer":3},{"part":3,"no":5,"question":"ANSI-SPARC 3단계 스키마 구조 중, 설계자의 관점에서 데이터베이스 전체의 논리적 구조를 정의하고 모든 사용자 관점을 통합하여 표현하는 것은?","options":["외부 스키마","개념 스키마","내부 스키마","통합 스키마"],"answer":2},{"part":3,"no":6,"question":"ANSI-SPARC 3단계 스키마 구조 중, 개별 사용자나 응용 프로그램 관점에서 필요한 데이터만 선별하여 보여주는 View에 해당하는 것은?","options":["외부 스키마","개념 스키마","내부 스키마","물리 스키마"],"answer":1},{"part":3,"no":7,"question":"데이터 파일의 저장 위치 변경이나 인덱스 추가와 같은 물리적 변경이 기존 응용 프로그램에 영향을 주지 않는 특징은?","options":["논리적 독립성","물리적 독립성","개념적 독립성","응용 독립성"],"answer":2},{"part":3,"no":8,"question":"다음 중 좋은 엔터티의 특징으로 가장 적절하지 않은 것은?","options":["업무에서 관리해야 할 필요가 있는 정보의 집합이어야 한다.","유일하게 식별 가능한 고유 식별자를 가져야 한다.","다른 엔터티와는 관계를 맺지 않고 독립적으로만 존재해야 한다.","엔터티를 설명하는 하나 이상의 속성을 가져야 한다."],"answer":3},{"part":3,"no":9,"question":"ERD 작성 과정의 순서로 가장 올바른 것은?","options":["핵심 엔터티 도출 → 엔터티 배치 → 관계 설정 → 관계명 기술 → 참여도 기술 → 필수/선택 여부 기술","엔터티 배치 → 핵심 엔터티 도출 → 관계 설정 → 참여도 기술 → 필수/선택 여부 기술 → 관계명 기술","핵심 엔터티 도출 → 관계 설정 → 엔터티 배치 → 관계명 기술 → 필수/선택 여부 기술 → 참여도 기술","핵심 엔터티 도출 → 엔터티 배치 → 관계 설정 → 참여도 기술 → 관계명 기술 → 필수/선택 여부 기술"],"answer":1},{"part":3,"no":10,"question":"다음 중 정보의 성격이 나머지 셋과 가장 다른 하나는?","options":["고객","고객이름","가입일자","고객등급"],"answer":1},{"part":3,"no":11,"question":"다음 중 엔터티를 분류하는 기준이 나머지 셋과 다른 하나는?","options":["기본 엔터티","중심 엔터티","유형 엔터티","행위 엔터티"],"answer":3},{"part":3,"no":12,"question":"업무에 원래부터 존재하는 정보로, 다른 엔터티에 의존하지 않고 독립적으로 생성되는 엔터티의 종류로 가장 적절한 것은?","options":["기본 엔터티","중심 엔터티","행위 엔터티","유형 엔터티"],"answer":1},{"part":3,"no":13,"question":"ORDERS 테이블에서 QUANTITY와 UNIT_PRICE를 이용하여 계산되는 ORDER_AMOUNT 속성은 어떤 종류의 속성인가?","options":["기본 속성","설계 속성","파생 속성","PK 속성"],"answer":3},{"part":3,"no":14,"question":"EMPLOYEES 테이블의 DEPT_ID 속성이 DEPARTMENTS 테이블의 기본키를 참조하여 두 테이블 간 관계를 연결한다면, 이 DEPT_ID는 무엇인가?","options":["기본키 속성","외래키 속성","일반 속성","단일 속성"],"answer":2},{"part":3,"no":15,"question":"데이터 모델링에서 속성이 가질 수 있는 값의 종류, 범위, 규칙 등을 정의한 것은?","options":["엔터티","관계","도메인","식별자"],"answer":3},{"part":3,"no":16,"question":"주문과 주문상세 엔터티의 식별 관계에 대한 설명으로 가장 올바르지 않은 것은?","options":["주문 엔터티의 주식별자는 주문상세 엔터티의 주식별자 일부로 상속된다.","하나의 주문에는 반드시 하나 이상의 주문상세가 존재해야 한다.","주문상세 데이터는 주문 데이터가 없어도 독립적으로 생성될 수 있다.","하나의 주문상세는 반드시 하나의 특정 주문에 속한다."],"answer":3},{"part":3,"no":17,"question":"DEPARTMENTS와 EMPLOYEES의 ERD에서 EMPLOYEES가 DEPT_ID를 FK로 갖고, 직원은 반드시 하나의 부서에 소속되어야 한다. 다음 설명 중 가장 올바르지 않은 것은?","options":["DEPARTMENTS와 EMPLOYEES는 비식별자 관계이다.","하나의 부서에는 여러 명의 직원이 소속될 수 있다.","직원이 없는 신규 부서를 등록할 수 있다.","부서에 소속되지 않은 직원을 등록할 수 있다."],"answer":4},{"part":3,"no":18,"question":"좋은 주식별자가 만족해야 할 특징으로 가장 적절하지 않은 것은?","options":["유일성: 모든 인스턴스를 유일하게 식별해야 한다.","최소성: 유일성을 만족하는 최소한의 속성으로 구성되어야 한다.","가변성: 업무 변화에 따라 값의 변경이 용이해야 한다.","존재성: NULL 값을 가질 수 없고 반드시 값이 존재해야 한다."],"answer":3},{"part":3,"no":19,"question":"식별자를 분류하는 기준과 그에 따른 종류가 잘못 짝지어진 것은?","options":["대표성 여부: 주식별자, 보조식별자","생성 여부: 내부식별자, 외부식별자","속성 개수: 단일식별자, 복합식별자","대체 여부: 기본식별자, 외래식별자"],"answer":4},{"part":3,"no":20,"question":"다음 중 식별자 관계에 대한 설명으로 가장 올바른 것은?","options":["부모 엔터티의 기본키를 자식 엔터티의 일반 속성, 즉 외래키로만 사용한다.","자식 엔터티가 부모 엔터티 없이 독립적으로 존재할 수 있는 약한 종속 관계이다.","ERD에서 관계를 점선으로 표현한다.","부모 엔터티의 기본키가 자식 엔터티의 기본키 일부로 포함된다."],"answer":4},{"part":3,"no":21,"question":"다음 중 정규화의 주된 목적으로 가장 올바른 것은?","options":["데이터 조회 성능을 극대화한다.","데이터의 중복을 방지하고 이상 현상을 해결한다.","테이블의 수를 최소화하여 모델을 단순하게 관리한다.","데이터 입력 및 수정 속도를 향상시킨다."],"answer":2},{"part":3,"no":22,"question":"LECTURES 테이블에서 'P02' 교수의 이름이 '이영희'로 변경되었지만 일부 과목의 교수 이름만 수정되어 데이터 불일치가 발생했다. 이 현상은 무엇인가?\n\n[LECTURES]\nCOURSE_ID | COURSE_NAME | PROF_ID | PROF_NAME\nC101 | 데이터베이스 | P02 | 이교수\nC102 | 알고리즘 | P01 | 김교수\nC103 | 자료구조 | P02 | 이교수","options":["삽입 이상","갱신 이상","삭제 이상","종속 이상"],"answer":2},{"part":3,"no":23,"question":"PROJECT_MEMBERS 테이블이 위반하고 있는 정규형으로 가장 올바른 것은?\n\n[PROJECT_MEMBERS]\nPROJECT_ID | EMP_ID | EMP_NAME | TECH_STACKS\nPJT01 | E101 | KIM | Java, Python\nPJT01 | E102 | LEE | SQL\nPJT02 | E101 | KIM | React, Node.js","options":["제1정규형(1NF)","제2정규형(2NF)","제3정규형(3NF)","BCNF"],"answer":1},{"part":3,"no":24,"question":"ENROLLMENTS 테이블에 제2정규화가 필요한 이유로 가장 적절한 것은?\n\n[ENROLLMENTS]\nSTUDENT_ID | COURSE_ID | STUDENT_NAME | GRADE\nS1001 | C101 | KIM | A+\nS1001 | C102 | KIM | B0\nS1002 | C101 | LEE | A0\n\n기본키는 STUDENT_ID + COURSE_ID의 복합키라고 가정한다.","options":["STUDENT_NAME이 일반 속성인 GRADE에 종속되기 때문이다.","GRADE가 기본키의 일부인 STUDENT_ID에 종속되기 때문이다.","STUDENT_NAME이 기본키의 일부인 STUDENT_ID에만 종속되기 때문이다.","기본키가 STUDENT_ID 단일 컬럼으로만 구성되어야 하기 때문이다."],"answer":3},{"part":3,"no":25,"question":"EMPLOYEES 테이블에 제3정규화가 필요한 이유로 가장 적절한 것은?\n\n[EMPLOYEES]\nEMP_ID | EMP_NAME | DEPT_CODE | DEPT_NAME\nE101 | KIM | D01 | Marketing\nE102 | LEE | D02 | Development\nE103 | PARK | D01 | Marketing","options":["DEPT_NAME이 기본키인 EMP_ID에 종속되기 때문이다.","EMP_NAME이 일반 속성인 DEPT_NAME에 종속되기 때문이다.","DEPT_NAME이 기본키가 아닌 일반 속성인 DEPT_CODE에 종속되기 때문이다.","DEPT_CODE가 기본키인 EMP_ID에 부분적으로 종속되기 때문이다."],"answer":3},{"part":3,"no":26,"question":"정규화의 각 단계에 대한 설명으로 가장 올바른 것은?","options":["제1정규형은 이행 함수 종속을 제거하는 것을 목표로 한다.","제2정규형은 속성값이 반드시 원자값이어야 함을 의미한다.","제2정규형은 기본키가 아닌 속성 간의 종속 관계를 제거하는 것이다.","제3정규형은 이행 함수 종속, 즉 일반 속성 간의 종속 관계를 제거하는 것이다."],"answer":4},{"part":3,"no":27,"question":"다음 중 반정규화를 고려하는 가장 주된 이유는?","options":["데이터의 일관성을 최우선으로 보장하기 위해","데이터 조회 성능을 향상시키기 위해","데이터 저장 공간을 최소화하기 위해","데이터 모델의 구조를 단순화하기 위해"],"answer":2},{"part":3,"no":28,"question":"다음 두 테이블은 1:1 관계이며, 사용자의 정보를 조회할 때마다 항상 조인하여 사용하고 있다. 성능 저하를 해결하기 위한 가장 적절한 반정규화 기법은?\n\n[USER]\nUSER_ID | USER_NAME\n\n[USER_DETAIL]\nUSER_ID(FK) | USERNAME | ADDRESS | PHONE_NO\n\n두 테이블은 항상 함께 조회된다고 가정한다.","options":["테이블 병합","테이블 수직 분할","테이블 수평 분할","중복 컬럼 추가"],"answer":1},{"part":3,"no":29,"question":"PRODUCTS 테이블에서 PRODUCT_DESCRIPTION처럼 자주 사용하지 않는 큰 컬럼 때문에 조회 성능이 저하된다. 이를 해결하기 위한 가장 적절한 반정규화 기법은?\n\n[PRODUCTS]\nPRODUCT_ID | PRODUCT_NAME | PRICE | STOCK | PRODUCT_DESCRIPTION\nP1001 | Notebook | 1500000 | 50 | High-performance notebook...\nP1002 | Monitor | 300000 | 120 | 27-inch QHD monitor...","options":["테이블 병합","테이블 수직 분할","테이블 수평 분할","통계 테이블 추가"],"answer":2},{"part":3,"no":30,"question":"ORDERS 테이블에는 수년간의 데이터가 1억 건 존재하며, 대부분의 조회는 최근 1년 데이터에 집중된다. 최근 주문 조회 시 과거 데이터까지 스캔되어 성능이 저하될 때 가장 적절한 반정규화 기법은?","options":["테이블 병합","테이블 수직 분할","테이블 수평 분할","이력 테이블 추가"],"answer":3},{"part":3,"no":31,"question":"대시보드에 '월별 총 매출액'을 표시하기 위해 SALES 테이블에 대한 집계 쿼리가 반복 실행되어 시스템 부하가 발생하고 있다. 가장 효율적인 반정규화 기법은?\n\n예시 쿼리\nSELECT SUM(SALE_AMOUNT)\nFROM SALES\nWHERE SALE_MONTH = '2025-09';","options":["통계 테이블 추가","테이블 수직 분할","이력 테이블 추가","중복 컬럼 추가"],"answer":1},{"part":3,"no":32,"question":"다음 데이터 모델에 필요한 정규화로 가장 올바른 것은?\n\n[수강내역]\n학생ID(PK) | 과목ID(PK) | 학생명 | 과목명 | 성적\nS101 | C01 | 김민준 | 데이터베이스 | A+\nS101 | C02 | 김민준 | 알고리즘 | B0\nS102 | C01 | 이서아 | 데이터베이스 | A0\n\n기본키는 학생ID + 과목ID의 복합키라고 가정한다.","options":["1차 정규화","2차 정규화","3차 정규화","반정규화"],"answer":2},{"part":3,"no":33,"question":"하나의 테이블을 컬럼의 사용 빈도에 따라 두 개로 분리하는 반정규화 기법은?\n\n예시\n[상품]\n상품ID | 상품명 | 가격 | 재고 | 상품상세설명\n\n분리 후\n[상품_기본]\n상품ID | 상품명 | 가격 | 재고\n\n[상품_상세]\n상품ID | 상품상세설명","options":["테이블 병합","수평 분할","수직 분할","통계 테이블 추가"],"answer":3},{"part":3,"no":34,"question":"ERD에서 조회 경로 단축을 위해 중복 관계를 추가하는 반정규화 기법은?","options":["관계 반정규화","테이블 병합","컬럼 반정규화","슈퍼/서브타입 통합"],"answer":1},{"part":3,"no":35,"question":"작업이 하나의 묶음처럼 처리되어 두 작업이 '모두 성공하거나 모두 실패'하도록 보장하는 트랜잭션의 특성은?","options":["원자성(Atomicity)","일관성(Consistency)","고립성(Isolation)","지속성(Durability)"],"answer":1},{"part":3,"no":36,"question":"다음 주문과 결제 데이터 모델을 보고 예측되는 사항으로 가장 적절하지 않은 것은?\n\n[주문]\n주문번호 | 주문일자 | 회원ID | 총주문금액\n\n[결제]\n주문번호(FK) | 결제순번 | 결제수단 | 결제금액\n\n주문과 결제는 주문번호로 연결되어 있다고 가정한다.","options":["결제 데이터는 주문 데이터 없이 독립적으로 생성될 수 없다.","하나의 주문에는 반드시 하나 이상의 결제 내역이 존재해야 한다.","하나의 결제는 여러 개의 주문에 나누어 포함될 수 있다.","신규 주문 등록과 첫 결제 데이터 생성은 하나의 트랜잭션으로 처리되어야 한다."],"answer":3},{"part":3,"no":37,"question":"여러 사용자가 동시에 하나의 상품을 주문할 때, 각 주문을 독립적으로 처리하여 재고가 잘못 계산되지 않도록 한다. 이처럼 하나의 트랜잭션 실행 중에 다른 트랜잭션이 영향을 주지 못하도록 격리하는 특성은?","options":["원자성","일관성","고립성","지속성"],"answer":3},{"part":3,"no":38,"question":"본질식별자와 인조식별자에 대한 설명으로 가장 옳지 않은 것은?","options":["본질식별자는 키값 자체에 업무적인 의미가 포함되어 있다.","인조식별자는 보통 일련번호처럼 의미 없이 순차적으로 증가하는 값을 사용한다.","본질식별자는 업무 규칙 변경 시 키값이 변경될 수 있어 유지보수가 어려운 단점이 있다.","인조식별자를 사용하면 키값만으로 데이터의 내용을 유추할 수 있다."],"answer":4},{"part":3,"no":39,"question":"REGISTRATIONS 테이블이 등록일자, 학생ID, 과목코드, 순번을 조합한 복합키를 주식별자로 사용하고 있다. 복잡한 본질식별자로 인한 관리 어려움을 해결하기 위한 가장 권장되는 식별자 설계 방안은?\n\n[REGISTRATIONS]\n등록일자\n학생ID\n과목코드\n순번\n등록상태\n\n현재 등록일자 + 학생ID + 과목코드 + 순번이 복합 주식별자로 사용되고 있다고 가정한다.","options":["주식별자를 제거하고 일반 속성으로만 테이블을 구성한다.","등록상태 컬럼을 주식별자에 추가하여 유일성을 강화한다.","기존 복합키를 보조식별자로 유지하고, 단순한 인조식별자를 주식별자로 새로 추가한다.","학생ID와 과목코드만으로 주식별자를 재구성하여 키를 단순화한다."],"answer":3},{"part":3,"no":40,"question":"정규화와 반정규화에 대한 설명으로 가장 올바른 것은?","options":["정규화는 데이터의 일관성을 높이지만, 조회 성능은 항상 향상된다.","반정규화는 조회 성능을 높이는 것을 목적으로 하며, 데이터의 일관성에는 영향을 주지 않는다.","정규화 수준이 높을수록 데이터 모델의 유연성은 증가하지만, 저장 공간 효율은 나빠진다.","데이터의 일관성 확보가 중요하면 정규화를, 조회 성능 향상이 중요하면 반정규화를 고려한다."],"answer":4},{"part":4,"no":1,"question":"다음 VISIT_LOG 테이블을 대상으로 다음 SQL문을 실행했을 때의 결과 행의 수는?\n[이미지 기반 실전 문제]\n\n[VISIT_LOG]\nLOG_ID | USER_ID | VISIT_DATE\n1      | U01     | 2025-09-01\n2      | U02     | 2025-09-01\n3      | U01     | 2025-09-02\n4      | U01     | 2025-09-03\n\n[SQL]\nSELECT DISTINCT USER_ID FROM VISIT_LOG;","options":["1","2","3","4"],"answer":2},{"part":4,"no":2,"question":"다음 SQL문을 실행했을 때 오류가 발생하는 이유로 가장 올바른 것은?\n[이미지 기반 실전 문제]\n\n[SQL]\nSELECT\n    EMP_NAME,\n    SALARY * 1.1 AS NEW_SAL\nFROM EMPLOYEES\nWHERE NEW_SAL > 5000;","options":["SELECT절에서는 산술연산을 사용할 수 없기 때문이다.","WHERE절은 SELECT절보다 먼저 실행되므로 NEW_SAL이라는 별칭(Alias)을 인식할 수 없기 때문이다.","WHERE절에서는 산술 연산을 사용할 수 없기 때문이다.","NEW_SAL이라는 별칭에 따옴표가 없기 때문이다."],"answer":2},{"part":4,"no":3,"question":"아래 EMPLOYEES 테이블에 다음 SQL을 실행했을 때 조회되는 EMP_NAME으로 올바른 것은?\n[이미지 기반 실전 문제]\n\n[EMPLOYEES]\nEMP_ID | EMP_NAME | DEPT_ID | SALARY | JOB_TITLE\n101    | King     | D01     | 5000   | Director\n102    | Scott    | D02     | 4500   | Manager\n103    | Smith    | D01     | 3800   | Staff\n104    | Allen    | D02     | 4200   | Staff\n\n[SQL]\nSELECT EMP_NAME\nFROM EMPLOYEES\nWHERE DEPT_ID = 'D01' AND SALARY > 4000 OR JOB_TITLE = 'Manager';","options":["King","Scott","King, Scott","King, Smith"],"answer":3},{"part":4,"no":4,"question":"PRODUCT_CODE가 'A'로 시작하고, 하이픈(-) 뒤에 세 자리 문자가 오며, 다시 하이픈(-) 뒤에 임의의 문자 1개로 끝나는 패턴(예: 'A-123-B')을 찾는 SQL 조건으로 가장 올바른 것은?\n[이미지 기반 실전 문제]\n\n접근 Point: LIKE 연산자에서 %는 0개 이상의 모든 문자, _는 정확히 1개의 문자를 의미한다.","options":["WHERE PRODUCT_CODE LIKE 'A-%'","WHERE PRODUCT_CODE LIKE 'A-___-_'","WHERE PRODUCT_CODE LIKE 'A-__%'","WHERE PRODUCT_CODE LIKE 'A-__'"],"answer":2},{"part":4,"no":5,"question":"다음 EMPLOYEES 테이블을 대상으로 할 때, 다음 SQL 조건문 중 나머지 셋과 조회되는 결과의 행 수가 다른 하나는?\n[이미지 기반 실전 문제]\n\n[EMPLOYEES]\nEMP_NAME | SALARY\nA        | 100\nB        | 150\nC        | 200\nD        | 250","options":["WHERE SALARY BETWEEN 100 AND 200","WHERE SALARY >= 100 AND SALARY <= 200","WHERE SALARY IN (100, 200)","WHERE NOT (SALARY < 100 OR SALARY > 200)"],"answer":3},{"part":4,"no":6,"question":"다음 중 SQL문의 논리적인 실행 순서로 가장 올바른 것은?\n[이미지 기반 실전 문제]\n\n접근 Point: SQL문이 작성되는 순서가 아니라 데이터베이스 내부에서 논리적으로 처리되는 순서를 묻는 문제이다.","options":["SELECT → FROM → WHERE → GROUP BY → HAVING → ORDER BY","FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY","FROM → GROUP BY → WHERE → HAVING → SELECT → ORDER BY","SELECT → FROM → WHERE → GROUP BY → ORDER BY → HAVING"],"answer":2},{"part":4,"no":7,"question":"다음 중 CHAR와 VARCHAR2의 비교 특성에 대한 설명으로 가장 적절한 것은?\n[이미지 기반 실전 문제]\n\n접근 Point: CHAR 타입의 공백 채움(Padding) 특성과 VARCHAR2의 가변 길이 저장 방식을 구분해야 한다.","options":["CHAR 타입은 저장된 문자열의 길이가 달라도, 공백을 채워 길이를 맞춘 후 비교한다.","VARCHAR2 타입은 문자열의 길이가 다르면 뒤에 공백을 채워 길이를 맞춘 후 비교한다.","CHAR(10) 컬럼에 'A'를 저장하면 1바이트만 차지하고 나머지 공간은 반환된다.","VARCHAR2(10) 컬럼에 'A'를 저장하면 10바이트 공간을 모두 차지한다."],"answer":1},{"part":4,"no":8,"question":"다음 SQL문의 실행 결과로 올바른 것은?\n[이미지 기반 실전 문제]\n\n[SQL]\nSELECT CASE WHEN 100 > 200 THEN 'A'\n            WHEN 100 = 100 THEN 'B'\n            ELSE 'C'\n       END AS RESULT\nFROM DUAL;","options":["A","B","C","NULL"],"answer":2},{"part":4,"no":9,"question":"다음 중 NULL 처리에 대한 설명으로 가장 적절한 것은? (Oracle 기준)\n[이미지 기반 실전 문제]\n\n접근 Point: NULL은 알 수 없는 값이며, 일반 비교나 산술연산에서의 처리 방식을 구분해야 한다.","options":["NULL과 숫자 0은 동일한 값으로 취급된다.","NULL이 포함된 산술연산(+, -, *, /)의 결과는 항상 NULL이다.","집계 함수 COUNT(*)는 NULL 값을 제외하고 행의 수를 센다.","WHERE COMM = NULL 조건을 사용하여 COMM 컬럼이 NULL인 데이터를 조회할 수 있다."],"answer":2},{"part":4,"no":10,"question":"아래 SQL의 실행 결과로 올바른 것은?\n[이미지 기반 실전 문제]\n\n[SQL]\nSELECT COALESCE(NULL, 'A', 'B') AS COL1,\n       NULLIF('A', 'A') AS COL2\nFROM DUAL;","options":["COL1: A, COL2: A","COL1: B, COL2: NULL","COL1: A, COL2: NULL","COL1: NULL, COL2: A"],"answer":3},{"part":4,"no":11,"question":"다음 EMPLOYEES 테이블을 대상으로 다음 SQL문을 실행했을 때의 결과로 가장 올바른 것은?\n[이미지 기반 실전 문제]\n\n[EMPLOYEES]\nEMP_ID | EMP_NAME | COMMISSION\n101    | King     | 500\n102    | Scott    | NULL\n103    | Smith    | 300\n104    | Allen    | NULL\n\n[SQL]\nSELECT COUNT(*), COUNT(COMMISSION)\nFROM EMPLOYEES;","options":["4, 4","4, 2","2, 2","2, 4"],"answer":2},{"part":4,"no":12,"question":"아래 PRODUCTS 테이블을 대상으로 다음 SQL문을 실행했을 때의 결과로 가장 올바른 것은?\n[이미지 기반 실전 문제]\n\n[PRODUCTS]\nPRODUCT_NAME | PRICE\nA            | 500\nB            | 1500\nC            | 2500\n\n[SQL]\nSELECT\n    PRODUCT_NAME,\n    CASE\n        WHEN PRICE > 1000 THEN '고가'\n        WHEN PRICE > 2000 THEN '초고가'\n        ELSE '일반'\n    END AS PRICE_TIER\nFROM PRODUCTS;","options":["A: 일반, B: 고가, C: 초고가","A: 일반, B: 고가, C: 고가","A: 일반, B: 일반, C: 초고가","A: NULL, B: 고가, C: 초고가"],"answer":2},{"part":4,"no":13,"question":"다음 ORDERS 테이블을 대상으로 다음 SQL문을 실행했을 때의 결과로 가장 올바른 것은?\n[이미지 기반 실전 문제]\n\n[ORDERS]\nCUSTOMER_ID | PRODUCT_CATEGORY | AMOUNT\nC01         | Electronics      | 1200\nC02         | Books            | 50\nC01         | Electronics      | 800\nC03         | Groceries        | 100\nC02         | Books            | 70\nC01         | Books            | 60\n\n[SQL]\nSELECT CUSTOMER_ID, SUM(AMOUNT) AS TOTAL_AMOUNT\nFROM ORDERS\nGROUP BY CUSTOMER_ID\nHAVING COUNT(*) >= 2 AND MAX(AMOUNT) > 100;","options":["C01, 2060","C01, 2060 / C02, 120","C02, 120","C01, 2000"],"answer":1},{"part":4,"no":14,"question":"다음 SQL문 중 실행 시 문법 오류가 발생하는 것은?\n[이미지 기반 실전 문제]\n\n접근 Point: WHERE절과 HAVING절의 역할 차이를 이해해야 한다. WHERE는 그룹화 전 개별 행을 필터링하고, HAVING은 그룹화 후 집계 결과를 필터링한다.","options":["SELECT DEPT_ID, AVG(SALARY) FROM EMPLOYEES GROUP BY DEPT_ID;","SELECT DEPT_ID, AVG(SALARY) FROM EMPLOYEES GROUP BY DEPT_ID HAVING AVG(SALARY) > 3000;","SELECT DEPT_ID, AVG(SALARY) FROM EMPLOYEES WHERE AVG(SALARY) > 3000 GROUP BY DEPT_ID;","SELECT DEPT_ID, SALARY FROM EMPLOYEES WHERE SALARY > 3000;"],"answer":3},{"part":4,"no":15,"question":"다음 EMPLOYEES 테이블을 대상으로 SQL문을 실행했을 때, 세 번째로 조회되는 직원의 EMP_NAME은? (Oracle 데이터베이스 기준)\n[이미지 기반 실전 문제]\n\n[EMPLOYEES]\nEMP_ID | EMP_NAME | DEPT_ID | SALARY | COMMISSION\n101    | King     | 10      | 5000   | 500\n102    | Scott    | 20      | 3000   | NULL\n103    | Smith    | 20      | 2800   | 300\n104    | Allen    | 10      | 2500   | 800\n105    | Ward     | 20      | 3200   | NULL\n\n[SQL]\nSELECT EMP_NAME, DEPT_ID, COMMISSION\nFROM EMPLOYEES\nORDER BY DEPT_ID ASC, COMMISSION DESC;","options":["King","Allen","Scott","Smith"],"answer":3},{"part":4,"no":16,"question":"다음 PRODUCTS 테이블을 대상으로 다음 SQL문을 실행했을 때, 'Mouse'의 FINAL_PRICE는?\n[이미지 기반 실전 문제]\n\n[PRODUCTS]\nPRODUCT_ID | PRODUCT_NAME | PRICE | DISCOUNT_RATE\nP101       | Notebook     | 1000  | 0.1\nP102       | Monitor      | 500   | 0.05\nP103       | Mouse        | 100   | NULL\n\n[SQL]\nSELECT\n    PRODUCT_NAME,\n    PRICE * (1 - DISCOUNT_RATE) AS FINAL_PRICE\nFROM PRODUCTS;","options":["100","0","90","NULL"],"answer":4},{"part":4,"no":17,"question":"다음은 각 부서별 평균 급여가 4000을 초과하는 부서를 조회하는 SQL문이다. 빈칸에 들어갈 가장 적절한 절 키워드는?\n[이미지 기반 실전 문제]\n\n[SQL]\nSELECT DEPT_ID,\n       AVG(SALARY) AS AVG_SAL\nFROM EMPLOYEES\nGROUP BY DEPT_ID\n____ AVG(SALARY) > 4000;","options":["WHERE","HAVING","ON","AND"],"answer":2} EPT_ID, EMP_NAME, AVG(SALARY)\nFROM EMPLOYEES\nGROUP BY DEPT_ID;","options":["정상 실행되며 DEPT_ID별 첫 번째 EMP_NAME이 출력된다.","EMP_NAME이 GROUP BY절이나 집계 함수에 포함되지 않아 오류가 발생한다.","AVG(SALARY)는 WHERE절에서만 사용할 수 있으므로 오류가 발생한다.","GROUP BY절에는 숫자 컬럼만 사용할 수 있으므로 오류가 발생한다."],"answer":2},{"part":4,"no":27,"question":"다음 중 부서별 평균 급여가 5000 이상인 부서를 조회하는 SQL문으로 가장 올바른 것은?\n[생성 문제 · SQLD 기출 유형]\n\n접근 Point: 집계 함수 조건은 그룹화 이후 HAVING절에서 처리한다.","options":["SELECT DEPT_ID FROM EMPLOYEES WHERE AVG(SALARY) >= 5000 GROUP BY DEPT_ID;","SELECT DEPT_ID FROM EMPLOYEES GROUP BY DEPT_ID HAVING AVG(SALARY) >= 5000;","SELECT DEPT_ID FROM EMPLOYEES HAVING AVG(SALARY) >= 5000 WHERE DEPT_ID IS NOT NULL;","SELECT DEPT_ID, EMP_NAME FROM EMPLOYEES GROUP BY DEPT_ID HAVING SALARY >= 5000;"],"answer":2},{"part":4,"no":28,"question":"다음 SQL문의 실행 결과로 올바른 것은?\n[생성 문제 · SQLD 기출 유형]\n\n[EMPLOYEES]\nEMP_ID | COMMISSION\n101    | 500\n102    | NULL\n103    | 300\n104    | NULL\n105    | 0\n\n[SQL]\nSELECT COUNT(*), COUNT(COMMISSION), SUM(COMMISSION)\nFROM EMPLOYEES;","options":["5, 5, 800","5, 3, 800","3, 3, 800","5, 2, 800"],"answer":2},{"part":4,"no":29,"question":"다음 중 SELECT절에서 정의한 별칭을 사용할 수 있는 절로 가장 적절한 것은?\n[생성 문제 · SQLD 기출 유형]\n\n[SQL 예시]\nSELECT SALARY * 12 AS ANNUAL_SAL\nFROM EMPLOYEES\nORDER BY ANNUAL_SAL DESC;","options":["WHERE절","GROUP BY절","HAVING절","ORDER BY절"],"answer":4},{"part":4,"no":30,"question":"Oracle 기준으로 다음 SQL문 실행 시 COMMISSION 값의 정렬 순서로 가장 적절한 것은?\n[생성 문제 · SQLD 기출 유형]\n\n[EMPLOYEES]\nEMP_NAME | COMMISSION\nA        | 300\nB        | NULL\nC        | 500\nD        | NULL\n\n[SQL]\nSELECT EMP_NAME, COMMISSION\nFROM EMPLOYEES\nORDER BY COMMISSION ASC;","options":["NULL, NULL, 300, 500","300, 500, NULL, NULL","500, 300, NULL, NULL","300, NULL, 500, NULL"],"answer":2},{"part":4,"no":31,"question":"다음 CASE 표현식의 결과로 올바른 것은?\n[생성 문제 · SQLD 기출 유형]\n\n[SQL]\nSELECT CASE\n           WHEN 6000 >= 3000 THEN '중간'\n           WHEN 6000 >= 5000 THEN '높음'\n           ELSE '낮음'\n       END AS GRADE\nFROM DUAL;","options":["높음","중간","낮음","NULL"],"answer":2},{"part":4,"no":32,"question":"다음 SQL문을 실행했을 때 결과 행의 수로 가장 올바른 것은?\n[생성 문제 · SQLD 기출 유형]\n\n[EMPLOYEES]\nEMP_ID | EMP_NAME | DEPT_ID\n101    | King     | 10\n102    | Scott    | 20\n103    | Smith    | 30\n\n[DEPARTMENTS]\nDEPT_ID | DEPT_NAME\n10      | HR\n20      | IT\n\n[SQL]\nSELECT e.EMP_NAME, d.DEPT_NAME\nFROM EMPLOYEES e INNER JOIN DEPARTMENTS d\nON e.DEPT_ID = d.DEPT_ID;","options":["1","2","3","4"],"answer":2},{"part":4,"no":33,"question":"다음 SQL문의 결과에 대한 설명으로 가장 올바른 것은?\n[생성 문제 · SQLD 기출 유형]\n\n[SQL]\nSELECT e.EMP_NAME, d.DEPT_NAME\nFROM EMPLOYEES e LEFT OUTER JOIN DEPARTMENTS d\nON e.DEPT_ID = d.DEPT_ID\nWHERE d.DEPT_NAME = 'HR';","options":["EMPLOYEES의 모든 행이 무조건 조회된다.","부서가 없는 직원도 DEPT_NAME이 NULL로 조회된다.","LEFT OUTER JOIN을 사용했지만 WHERE절에서 오른쪽 테이블 조건을 걸어 HR 부서와 매칭되는 행만 남는다.","WHERE절에서는 조인된 테이블의 컬럼을 사용할 수 없다."],"answer":3},{"part":4,"no":34,"question":"다음 SQL문 실행 결과에 대한 설명으로 가장 올바른 것은?\n[생성 문제 · SQLD 기출 유형]\n\n[SQL]\nSELECT e.EMP_NAME, d.DEPT_NAME\nFROM EMPLOYEES e LEFT OUTER JOIN DEPARTMENTS d\nON e.DEPT_ID = d.DEPT_ID AND d.DEPT_NAME = 'HR';","options":["EMPLOYEES의 모든 행이 조회되며, HR이 아닌 부서는 DEPT_NAME이 NULL로 표시될 수 있다.","HR 부서 직원만 조회된다.","LEFT OUTER JOIN에서는 ON절에 조건을 추가할 수 없다.","INNER JOIN과 항상 동일한 결과가 나온다."],"answer":1},{"part":4,"no":35,"question":"다음 SQL문을 실행했을 때 결과 행의 수는?\n[생성 문제 · SQLD 기출 유형]\n\n[MAIN_DISHES]\nDISH_NAME\n스테이크\n파스타\n\n[DRINKS]\nDRINK_NAME\n콜라\n사이다\n주스\n\n[SQL]\nSELECT m.DISH_NAME, d.DRINK_NAME\nFROM MAIN_DISHES m CROSS JOIN DRINKS d;","options":["2","3","5","6"],"answer":4},{"part":4,"no":36,"question":"다음 NATURAL JOIN의 결과 행 수로 가장 올바른 것은?\n[생성 문제 · SQLD 기출 유형]\n\n[ORDERS]\nORDER_ID | CUST_ID\n1001     | C01\n1002     | C02\n1003     | C01\n\n[ORDER_DETAILS]\nORDER_ID | CUST_ID | PRODUCT_ID\n1001     | C01     | P1\n1002     | C03     | P2\n1003     | C01     | P3\n\n[SQL]\nSELECT *\nFROM ORDERS NATURAL JOIN ORDER_DETAILS;","options":["1","2","3","6"],"answer":2},{"part":4,"no":37,"question":"다음 SQL문을 실행했을 때 조회되는 DEPT_ID로 올바른 것은?\n[생성 문제 · SQLD 기출 유형]\n\n[EMPLOYEES]\nEMP_NAME | DEPT_ID | SALARY\nA        | 10      | 1000\nB        | 10      | 4000\nC        | 20      | 3500\nD        | 20      | 4500\nE        | 30      | 2000\n\n[SQL]\nSELECT DEPT_ID, COUNT(*) AS CNT\nFROM EMPLOYEES\nWHERE SALARY >= 3000\nGROUP BY DEPT_ID\nHAVING COUNT(*) >= 2;","options":["10","20","10, 20","결과 없음"],"answer":2},{"part":4,"no":38,"question":"다음 중 실행 순서와 관련된 설명으로 가장 적절하지 않은 것은?\n[생성 문제 · SQLD 기출 유형]\n\n접근 Point: SQL의 논리적 실행 순서는 FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY이다.","options":["WHERE절은 GROUP BY절보다 먼저 실행된다.","HAVING절은 GROUP BY 이후 그룹에 대한 조건을 처리한다.","ORDER BY절은 SELECT절에서 정의한 별칭을 사용할 수 있다.","SELECT절의 별칭은 WHERE절에서 자유롭게 사용할 수 있다."],"answer":4},{"part":4,"no":39,"question":"다음 SQL문의 실행 결과로 올바른 것은?\n[생성 문제 · SQLD 기출 유형]\n\n[SQL]\nSELECT NVL(NULL, 0) + 10 AS A,\n       COALESCE(NULL, NULL, 5) AS B,\n       NULLIF(3, 4) AS C\nFROM DUAL;","options":["A: 10, B: 5, C: 3","A: NULL, B: 5, C: NULL","A: 0, B: NULL, C: 3","A: 10, B: NULL, C: NULL"],"answer":1},{"part":4,"no":40,"question":"다음 중 ANSI JOIN의 USING절 사용에 대한 설명으로 가장 올바른 것은?\n[생성 문제 · SQLD 기출 유형]\n\n[예시]\nSELECT EMP_NAME, DEPT_ID, DEPT_NAME\nFROM EMPLOYEES JOIN DEPARTMENTS\nUSING (DEPT_ID);","options":["USING절은 두 테이블의 조인 컬럼명이 서로 다른 경우에만 사용할 수 있다.","USING절에 지정한 컬럼은 두 테이블에 동일한 이름으로 존재해야 한다.","USING절을 사용하면 조인 조건을 WHERE절에 반드시 다시 작성해야 한다.","USING절은 OUTER JOIN에서는 사용할 수 없다."],"answer":2},{"part":5,"no":7,"question":"다음 ORDERS 테이블을 사용하여 [결과]와 같이 조회하고자 한다. 다음 중 가장 올바른 SQL문은?*\n\n[ORDERS]\nCATEGORY    | PRODUCT | SALE_AMOUNT\nElectronics | TV      | 1000\nElectronics | Audio   | 500\nBooks       | SQL     | 200\n\n[결과]\nCATEGORY    | PRODUCT | TOTAL_SALES\nElectronics | TV      | 1000\nElectronics | Audio   | 500\nElectronics | NULL    | 1500\nBooks       | SQL     | 200\nBooks       | NULL    | 200\nNULL        | NULL    | 1700","options":["GROUP BY CATEGORY, PRODUCT","GROUP BY ROLLUP(PRODUCT, CATEGORY)","GROUP BY ROLLUP(CATEGORY, PRODUCT)","GROUP BY CUBE(CATEGORY, PRODUCT)"],"answer":3},{"part":5,"no":8,"question":"다음 중 ROLLUP과 CUBE 함수에 대한 설명으로 가장 올바른 것은?*","options":["ROLLUP은 컬럼 순서와 상관없이 모든 조합의 소계를 생성한다.","CUBE는 컬럼 순서에 따라 계층적인 소계를 생성한다.","ROLLUP(A, B)의 결과는 CUBE(A, B)의 결과에 항상 포함된다.","CUBE는 ROLLUP보다 항상 더 적은 수의 행을 결과로 반환한다."],"answer":3}];
    const partTitles = {
      1: 'Part 1 - 논리 DB설계2 (47문항)',
      2: 'Part 2 - 물리 DB설계 (46문항)',
      3: 'Part 3 - SQLD 1단원 (40문항)',
      4: 'Part 4 - SQLD 2단원 (40문항)',
      5: '2단원 2장 2문제 (2,2,2)'
    };
    const optionMarks = ['①', '②', '③', '④'];
    let currentPart = 1;
    let elapsedSeconds = 0;
    let timerId = null;
    let timerRunning = false;
    let reviewQuestionKeys = null;
    let lastWrongKeys = [];
    let reviewRound = 0;

    function storageKey(part, no) {
      return `db173-p${part}-q${no}`;
    }

    function questionKey(question) {
      return `${question.part}-${question.no}`;
    }

    function getPartQuestions() {
      return questions.filter(q => q.part === currentPart);
    }

    function getVisibleQuestions() {
      const partQuestions = getPartQuestions();
      if (!reviewQuestionKeys) return partQuestions;
      const keySet = new Set(reviewQuestionKeys);
      return partQuestions.filter(q => keySet.has(questionKey(q)));
    }

    function clearGradeState() {
      document.querySelectorAll('.question-card').forEach(card => {
        card.classList.remove('correct-card', 'wrong-card', 'unanswered-card');
        card.querySelectorAll('.answer-result').forEach(result => result.remove());
      });
    }

    function updateGradePanel(message = '문제를 모두 푼 뒤 채점하세요.') {
      document.getElementById('gradeStatus').textContent = message;
      document.getElementById('wrongRetryBtn').style.display = 'none';
      document.getElementById('returnPartBtn').style.display = reviewQuestionKeys ? 'inline-block' : 'none';
    }

    function showPart(part) {
      currentPart = part;
      reviewQuestionKeys = null;
      lastWrongKeys = [];
      reviewRound = 0;
      document.querySelectorAll('.tabs button').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`tab${part}`).classList.add('active');
      document.getElementById('partTitle').textContent = partTitles[part];
      renderQuestions();
      updateGradePanel();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderQuestions() {
      const form = document.getElementById('quizForm');
      const visibleQuestions = getVisibleQuestions();
      form.innerHTML = '';

      visibleQuestions.forEach(q => {
        const card = document.createElement('section');
        card.className = 'question-card';
        card.id = `question-${q.part}-${q.no}`;
        card.dataset.part = String(q.part);
        card.dataset.no = String(q.no);

        const title = document.createElement('div');
        title.className = 'question-title';
        title.textContent = `${q.no}. ${q.question}`;
        card.appendChild(title);

        if (q.image) {
          const image = document.createElement('img');
          image.className = 'question-image';
          image.src = q.image;
          image.alt = q.imageAlt || `${q.no}번 문제 이미지`;
          card.appendChild(image);
        }

        const saved = localStorage.getItem(storageKey(q.part, q.no));
        q.options.forEach((option, index) => {
          const label = document.createElement('label');
          const radio = document.createElement('input');
          radio.type = 'radio';
          radio.name = `q-${q.part}-${q.no}`;
          radio.value = String(index + 1);
          radio.checked = saved === radio.value;
          radio.addEventListener('change', () => {
            localStorage.setItem(storageKey(q.part, q.no), radio.value);
            card.classList.remove('correct-card', 'wrong-card', 'unanswered-card');
            card.querySelectorAll('.answer-result').forEach(result => result.remove());
          });

          const optionText = document.createElement('span');
          optionText.textContent = `${optionMarks[index]} ${option}`;
          label.append(radio, optionText);
          card.appendChild(label);
        });

        form.appendChild(card);
      });
    }

    function gradeVisibleQuestions() {
      clearGradeState();
      const visibleQuestions = getVisibleQuestions();
      const wrongKeys = [];
      let correctCount = 0;
      let unansweredCount = 0;

      visibleQuestions.forEach(q => {
        const card = document.getElementById(`question-${q.part}-${q.no}`);
        const selected = card.querySelector(`input[name="q-${q.part}-${q.no}"]:checked`);
        const result = document.createElement('div');
        result.className = 'answer-result';

        if (!selected) {
          unansweredCount += 1;
          wrongKeys.push(questionKey(q));
          card.classList.add('unanswered-card');
          result.classList.add('unanswered-result');
          result.textContent = `미응답 · 정답: ${optionMarks[q.answer - 1]}`;
        } else if (Number(selected.value) === q.answer) {
          correctCount += 1;
          card.classList.add('correct-card');
          result.classList.add('correct-result');
          result.textContent = '정답입니다.';
        } else {
          wrongKeys.push(questionKey(q));
          card.classList.add('wrong-card');
          result.classList.add('wrong-result');
          result.textContent = `오답입니다. · 정답: ${optionMarks[q.answer - 1]}`;
        }

        card.appendChild(result);
      });

      lastWrongKeys = wrongKeys;
      const total = visibleQuestions.length;
      const status = reviewQuestionKeys
        ? `오답 반복 ${reviewRound}회차: ${correctCount} / ${total} 정답 · 남은 오답 ${wrongKeys.length}개${unansweredCount ? ` · 미응답 ${unansweredCount}개` : ''}`
        : `채점 결과: ${correctCount} / ${total} 정답 · 오답 ${wrongKeys.length}개${unansweredCount ? ` · 미응답 ${unansweredCount}개` : ''}`;
      document.getElementById('gradeStatus').textContent = status;

      const retryBtn = document.getElementById('wrongRetryBtn');
      if (wrongKeys.length > 0) {
        retryBtn.style.display = 'inline-block';
        retryBtn.textContent = `오답 ${wrongKeys.length}문제만 다시 풀기`;
        retryBtn.onclick = () => startWrongReview(lastWrongKeys, reviewRound + 1);
      } else {
        retryBtn.style.display = 'none';
        document.getElementById('gradeStatus').textContent = `${status}\n다 맞춤 굿굿`;
      }

      document.getElementById('returnPartBtn').style.display = reviewQuestionKeys ? 'inline-block' : 'none';
      document.querySelector('.grade-panel').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // 사용자가 오답을 다시 채점할 때마다 이 함수가 자기 자신을 다시 연결한다.
    // 클릭 사이에는 호출 스택이 종료되므로 원하는 만큼 안전하게 반복할 수 있다.
    function startWrongReview(wrongKeys, roundNumber = 1) {
      if (!wrongKeys || wrongKeys.length === 0) {
        document.getElementById('gradeStatus').textContent = '남은 오답이 없습니다.';
        return;
      }

      reviewQuestionKeys = [...wrongKeys];
      reviewRound = roundNumber;
      reviewQuestionKeys.forEach(key => {
        const [part, no] = key.split('-').map(Number);
        localStorage.removeItem(storageKey(part, no));
      });

      document.getElementById('partTitle').textContent = `${partTitles[currentPart]} · 오답 반복 ${reviewRound}회차 (${reviewQuestionKeys.length}문항)`;
      renderQuestions();
      updateGradePanel(`오답 반복 ${reviewRound}회차입니다. 다시 답한 뒤 아래에서 채점하세요.`);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function returnToFullPart() {
      reviewQuestionKeys = null;
      lastWrongKeys = [];
      reviewRound = 0;
      document.getElementById('partTitle').textContent = partTitles[currentPart];
      renderQuestions();
      updateGradePanel();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetCurrentPart() {
      getPartQuestions().forEach(q => localStorage.removeItem(storageKey(q.part, q.no)));
      reviewQuestionKeys = null;
      lastWrongKeys = [];
      reviewRound = 0;
      document.getElementById('partTitle').textContent = partTitles[currentPart];
      renderQuestions();
      updateGradePanel('현재 파트의 답안을 모두 초기화했습니다.');
    }

    function formatTime(total) {
      const minutes = String(Math.floor(total / 60)).padStart(2, '0');
      const seconds = String(total % 60).padStart(2, '0');
      return `${minutes}:${seconds}`;
    }

    function toggleTimer() {
      const btn = document.getElementById('pauseBtn');
      if (timerRunning) {
        clearInterval(timerId);
        timerId = null;
        timerRunning = false;
        btn.textContent = '계속';
      } else {
        timerRunning = true;
        btn.textContent = '일시정지';
        timerId = setInterval(() => {
          elapsedSeconds += 1;
          document.getElementById('timer').textContent = formatTime(elapsedSeconds);
        }, 1000);
      }
    }

    function resetTimer() {
      if (timerId) clearInterval(timerId);
      timerId = null;
      timerRunning = false;
      elapsedSeconds = 0;
      document.getElementById('timer').textContent = '00:00';
      document.getElementById('pauseBtn').textContent = '시작';
    }

    renderQuestions();
    updateGradePanel();
  </script>
</body>
</html>
