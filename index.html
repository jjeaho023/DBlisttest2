  <script>

tions": ["EMPLOYEES의 모든 행이 조회되며, HR이 아닌 부서는 DEPT_NAME이 NULL로 표시될 수 있다.", "HR 부서 직원만 조회된다.", "LEFT OUTER JOIN에서는 ON절에 조건을 추가할 수 없다.", "INNER JOIN과 항상 동일한 결과가 나온다."], "answer": 1, "explanation": "ON절 조건은 매칭 조건에 영향을 주지만 LEFT JOIN은 왼쪽 행을 보존한다."}, {"part": 4, "no": 35, "question": "MAIN_DISHES 2행과 DRINKS 3행 CROSS JOIN 결과 행 수는?", "options": ["2", "3", "5", "6"], "answer": 4, "explanation": "CROSS JOIN은 모든 조합을 만들므로 2 × 3 = 6행이다."}, {"part": 4, "no": 36, "question": "NATURAL JOIN 결과 행 수는?", "options": ["1", "2", "3", "6"], "answer": 2, "explanation": "공통 컬럼 ORDER_ID와 CUST_ID가 모두 같은 행만 매칭된다. 1001-C01, 1003-C01 두 행이다."}, {"part": 4, "no": 37, "question": "WHERE SALARY>=3000 후 GROUP BY DEPT_ID HAVING COUNT(*)>=2 결과 DEPT_ID는?", "options": ["10", "20", "10, 20", "결과 없음"], "answer": 2, "explanation": "급여 3000 이상 직원이 2명 이상인 부서는 DEPT_ID 20뿐이다."}, {"part": 4, "no": 38, "question": "실행 순서 관련 설명으로 가장 적절하지 않은 것은?", "options": ["WHERE절은 GROUP BY절보다 먼저 실행된다.", "HAVING절은 GROUP BY 이후 그룹에 대한 조건을 처리한다.", "ORDER BY절은 SELECT절에서 정의한 별칭을 사용할 수 있다.", "SELECT절의 별칭은 WHERE절에서 자유롭게 사용할 수 있다."], "answer": 4, "explanation": "WHERE는 SELECT보다 먼저 실행되어 SELECT 별칭을 자유롭게 사용할 수 없다."}, {"part": 4, "no": 39, "question": "NVL(NULL,0)+10, COALESCE(NULL,NULL,5), NULLIF(3,4) 결과는?", "options": ["A: 10, B: 5, C: 3", "A: NULL, B: 5, C: NULL", "A: 0, B: NULL, C: 3", "A: 10, B: NULL, C: NULL"], "answer": 1, "explanation": "NVL은 NULL을 0으로 바꾸고, COALESCE는 첫 NULL 아닌 값 5를, NULLIF(3,4)는 다르므로 3을 반환한다."}, {"part": 4, "no": 40, "question": "ANSI JOIN의 USING절 설명으로 가장 올바른 것은?", "options": ["USING절은 두 테이블의 조인 컬럼명이 서로 다른 경우에만 사용할 수 있다.", "USING절에 지정한 컬럼은 두 테이블에 동일한 이름으로 존재해야 한다.", "USING절을 사용하면 조인 조건을 WHERE절에 반드시 다시 작성해야 한다.", "USING절은 OUTER JOIN에서는 사용할 수 없다."], "answer": 2, "explanation": "USING은 두 테이블에 같은 이름으로 존재하는 컬럼을 기준으로 조인할 때 쓴다."}];
    const partTitles = {"1": "논리 DB설계2 (47문항)", "2": "물리 DB설계 (46문항)", "3": "SQLD 1단원 (40문항)", "4": "SQLD 2단원 1장 (40문항)"};

    let currentPart = 1;
    let currentMode = "part";
    let currentQuestionSet = [];
    let lastWrongQuestions = [];
    let wrongNoteDepth = 0;

    let seconds = 0;
    let timerRunning = false;
    let timerStarted = false;
    setInterval(updateTimer, 1000);

    function updateTimer() {
      if (!timerRunning) return;
      seconds++;
      const min = String(Math.floor(seconds / 60)).padStart(2, "0");
      const sec = String(seconds % 60).padStart(2, "0");
      document.getElementById("timer").textContent = `${min}:${sec}`;
    }

    function startTimerOnce() {
      if (timerStarted) return;
      timerStarted = true;
      timerRunning = true;
      document.getElementById("pauseBtn").textContent = "일시정지";
    }

    function pauseTimer() {
      if (!timerStarted) return;
      timerRunning = !timerRunning;
      document.getElementById("pauseBtn").textContent = timerRunning ? "일시정지" : "다시시작";
    }

    function resetTimer() {
      seconds = 0;
      timerRunning = false;
      timerStarted = false;
      document.getElementById("timer").textContent = "00:00";
      document.getElementById("pauseBtn").textContent = "일시정지";
    }

    function makeQuestionSetByPart(part) {
      return questions.filter(q => q.part === part).map((q, idx) => ({
        ...q,
        originalIndex: idx,
        questionId: `p${part}_${idx}`
      }));
    }

    function showPart(part) {
      currentPart = part;
      currentMode = "part";
      wrongNoteDepth = 0;
      currentQuestionSet = makeQuestionSetByPart(part);
      lastWrongQuestions = [];

      for (let i = 1; i <= 4; i++) {
        document.getElementById(`tab${i}`).classList.toggle("active", part === i);
      }

      document.getElementById("partTitle").textContent = partTitles[part];
      document.getElementById("score").textContent = "";
      document.getElementById("wrongNoteBtn").style.display = "none";
      resetTimer();
      renderQuestions();
    }

    function renderQuestions() {
      const form = document.getElementById("quizForm");
      form.innerHTML = "";

      currentQuestionSet.forEach((q, index) => {
        const card = document.createElement("div");
        card.className = "question-card";

        const title = document.createElement("div");
        title.className = "question-title";

        const badge = currentMode === "wrongNote"
          ? `<span class="note-badge">오답노트 ${wrongNoteDepth}회차</span>`
          : "";

        title.innerHTML = `${index + 1}. ${q.question} ${badge}`;
        card.appendChild(title);

        q.options.forEach((opt, i) => {
          const label = document.createElement("label");
          label.innerHTML = `
            <input type="radio" name="q_${index}" value="${i + 1}" onclick="startTimerOnce()">
            ${i + 1}. ${opt}
          `;
          card.appendChild(label);
        });

        const result = document.createElement("div");
        result.className = "result";
        result.id = `result_${index}`;
        card.appendChild(result);

        form.appendChild(card);
      });
    }

    function gradeCurrentSet() {
      let correctCount = 0;
      let answeredCount = 0;
      lastWrongQuestions = [];

      currentQuestionSet.forEach((q, index) => {
        const checked = document.querySelector(`input[name="q_${index}"]:checked`);
        const result = document.getElementById(`result_${index}`);
        result.style.display = "block";

        if (!checked) {
          lastWrongQuestions.push(q);
          result.className = "result wrong";
          result.innerHTML = `미응답 ❌ <span class="explain">정답: ${q.answer}번. ${q.explanation}</span>`;
          return;
        }

        answeredCount++;
        const userAnswer = Number(checked.value);

        if (userAnswer === q.answer) {
          correctCount++;
          result.className = "result correct";
          result.innerHTML = `정답 ✅ <span class="explain">${q.explanation}</span>`;
        } else {
          lastWrongQuestions.push(q);
          result.className = "result wrong";
          result.innerHTML = `오답 ❌ <span class="explain">내 답: ${userAnswer}번 / 정답: ${q.answer}번. ${q.explanation}</span>`;
        }
      });

      document.getElementById("score").textContent =
        `점수: ${correctCount} / ${currentQuestionSet.length}점  |  응답: ${answeredCount} / ${currentQuestionSet.length}문제`;

      const wrongNoteBtn = document.getElementById("wrongNoteBtn");

      if (lastWrongQuestions.length > 0) {
        wrongNoteBtn.style.display = "block";
        wrongNoteBtn.textContent = `오답노트 다시 풀기 (${lastWrongQuestions.length}문제)`;
      } else {
        wrongNoteBtn.style.display = "none";
        document.getElementById("score").textContent += "  |  전부 정답!";
      }
    }

    function startWrongNote() {
      if (lastWrongQuestions.length === 0) {
        alert("틀린 문제가 없습니다.");
        return;
      }

      currentMode = "wrongNote";
      wrongNoteDepth++;
      currentQuestionSet = lastWrongQuestions.map(q => ({ ...q }));
      lastWrongQuestions = [];

      document.getElementById("partTitle").textContent =
        `오답노트 ${wrongNoteDepth}회차 - 틀린 문제만 다시 풀기`;
      document.getElementById("score").textContent = "";
      document.getElementById("wrongNoteBtn").style.display = "none";
      resetTimer();
      renderQuestions();
    }

    function resetCurrentSet() {
      document.querySelectorAll(`#quizForm input[type="radio"]`).forEach(input => input.checked = false);
      document.querySelectorAll(".result").forEach(r => {
        r.style.display = "none";
        r.textContent = "";
      });
      document.getElementById("score").textContent = "";
      document.getElementById("wrongNoteBtn").style.display = "none";
      lastWrongQuestions = [];
      resetTimer();
    }

    currentQuestionSet = makeQuestionSetByPart(1);
    renderQuestions();
  </script>
